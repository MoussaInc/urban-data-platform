name: CI — urban-data-platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-dag:
    name: DAG unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest dag/ -v --tb=short

  test-dbt:
    name: dbt tests
    runs-on: ubuntu-latest
    needs: test-dag

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
      DBT_PROJECT_DIR: ${{ github.workspace }}/dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: dbt deps
        run: uv run dbt deps --project-dir $DBT_PROJECT_DIR

      - name: dbt compile (validation syntaxe)
        run: uv run dbt compile --project-dir $DBT_PROJECT_DIR

      - name: dbt run staging
        run: uv run dbt run -m stg_osm_features --project-dir $DBT_PROJECT_DIR

      - name: dbt test staging
        run: uv run dbt test -m stg_osm_features --project-dir $DBT_PROJECT_DIR

      - name: dbt build pipeline complet
        run: uv run dbt build -m stg_osm_features+ --project-dir $DBT_PROJECT_DIR