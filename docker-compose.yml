version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/creds.json
  volumes:
    - ./dag:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./dbt/profiles/profiles.yml:/home/airflow/.dbt/profiles.yml:ro 
    - ${HOME}/.config/gcloud/application_default_credentials.json:/opt/airflow/gcp/creds.json:ro
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - ./airflow-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: always

  dbt:
    image: xemuliam/dbt:bigquery-alpine
    volumes:
      - ./dbt:/usr/app/dbt
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    working_dir: /usr/app/dbt
    entrypoint: tail -f /dev/null

  streamlit:
      image: python:3.12
      volumes:
        - ./dashboard:/app/dashboard
        - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
      environment:
        GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      working_dir: /app/dashboard
      ports:
        - "8501:8501"
      command: >
        bash -c "pip install streamlit pandas plotly google-cloud-bigquery db-dtypes &&
               streamlit run app.py --server.port 8501 --server.address 0.0.0.0"